<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>صفحات المشروع</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>📊 الصفحات المرئية من Supabase</h1>
  <ul id="pages"></ul>

  <script>
    // تهيئة Supabase Client
    const supabase = window.supabase.createClient(
      "https://bixlzoyhaotjegzlwpvn.supabase.co", // رابط مشروعك
      "public-anon-key" // ضع المفتاح العام هنا من Supabase Settings
    );

    async function loadPages() {
      const { data, error } = await supabase
        .from("page_visibility")
        .select("page_key, visible")
        .eq("visible", true);

      if (error) {
        document.getElementById("pages").innerHTML = "<li>❌ خطأ في الاتصال</li>";
        console.error(error);
        return;
      }

      const list = document.getElementById("pages");
      list.innerHTML = "";
      data.forEach(p => {
        const li = document.createElement("li");
        li.textContent = p.page_key;
        list.appendChild(li);
      });
    }

    loadPages();
  </script>
</body>
</html>
